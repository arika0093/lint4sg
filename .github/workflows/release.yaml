name: Package Release to GitHub and NuGet

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  package-build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run tests
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Generate NuGet Package
        run: dotnet pack --no-build -c Release --output ./artifacts

      - name: Get version from package
        id: version
        shell: bash
        run: |
          package_path=$(find ./artifacts -maxdepth 1 -name 'lint4sg.*.nupkg' | head -n 1)
          package_name=$(basename "$package_path" .nupkg)
          echo "version=${package_name#lint4sg.}" >> "$GITHUB_OUTPUT"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
          retention-days: 1

  release-github:
    runs-on: ubuntu-latest
    needs: package-build
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.package-build.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ./artifacts/*.nupkg
          prerelease: ${{ contains(needs.package-build.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-nuget:
    runs-on: ubuntu-latest
    needs: package-build
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts

      - name: Publish NuGet Package
        run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}
